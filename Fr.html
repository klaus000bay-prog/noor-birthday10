<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Adventure for Sadaf (Noor)</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(180deg,#ffe4f1,#ff9ecb);
color:white;
text-align:center;
overflow:hidden;
}

/* sections */

.section{
display:none;
padding-top:120px;
height:100vh;
}

/* sparkles */

.star{
position:absolute;
width:3px;
height:3px;
background:white;
opacity:.8;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:.3}
to{opacity:1}
}

/* title */

h1{
font-size:52px;
text-shadow:0 0 15px white;
}

/* buttons */

button{
padding:15px 35px;
font-size:18px;
border:none;
border-radius:30px;
background:white;
color:#ff4fa3;
cursor:pointer;
margin-top:20px;
transition:.3s;
}

button:hover{
transform:scale(1.1);
}

/* cake */

.cake{
font-size:65px;
margin-top:20px;
animation:bounce 1s infinite alternate;
}

@keyframes bounce{
from{transform:translateY(0)}
to{transform:translateY(-12px)}
}

/* floating hearts */

.heart{
position:absolute;
color:#ff4fa3;
font-size:22px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* petals */

.petal{
position:absolute;
font-size:20px;
animation:fall 8s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh)}
100%{transform:translateY(110vh)}
}

/* message */

.message{
font-size:22px;
max-width:700px;
margin:auto;
line-height:1.6;
}

/* input */

input{
padding:10px;
font-size:18px;
border-radius:10px;
border:none;
}

/* sparkle cursor */

.sparkle{
position:absolute;
color:white;
font-size:14px;
pointer-events:none;
animation:fade 1s linear forwards;
}

@keyframes fade{
0%{opacity:1}
100%{opacity:0}
}

</style>
</head>

<body>

<!-- START -->

<div class="section" id="s1" style="display:block">

<h1>Hello Sadaf (Noor) 🌸</h1>

<p>I made a little birthday adventure for you.</p>

<p>Follow the journey to reach your surprise.</p>

<button onclick="next(2)">Start the Journey</button>

</div>

<!-- STEP 1 -->

<div class="section" id="s2">

<h1>Step One</h1>

<p>Some people celebrate birthdays.</p>

<p>But today celebrates someone special.</p>

<button onclick="next(3)">Continue</button>

</div>

<!-- PUZZLE -->

<div class="section" id="s3">

<h1>One Small Question</h1>

<p>Who is this little adventure made for?</p>

<input id="answer" placeholder="Type the name">

<br><br>

<button onclick="check()">Unlock</button>

</div>

<!-- FINAL -->

<div class="section" id="s4">

<h1>Happy Birthday Sadaf (Noor) 🎂</h1>

<div class="cake">🎂</div>

<p class="message" id="text"></p>

</div>

<script>

/* stars */

for(let i=0;i<120;i++){
let star=document.createElement("div");
star.className="star";
star.style.top=Math.random()*100+"vh";
star.style.left=Math.random()*100+"vw";
document.body.appendChild(star);
}

/* hearts */

function createHeart(){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=4+Math.random()*3+"s";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),6000);
}
setInterval(createHeart,400);

/* petals */

function createPetal(){
let petal=document.createElement("div");
petal.className="petal";
petal.innerHTML="🌸";
petal.style.left=Math.random()*100+"vw";
petal.style.animationDuration=5+Math.random()*5+"s";
document.body.appendChild(petal);
setTimeout(()=>petal.remove(),9000);
}
setInterval(createPetal,800);

/* sparkle cursor */

document.addEventListener("mousemove",function(e){

let s=document.createElement("div");

s.className="sparkle";
s.innerHTML="✦";

s.style.left=e.pageX+"px";
s.style.top=e.pageY+"px";

document.body.appendChild(s);

setTimeout(()=>s.remove(),1000);

});

/* navigation */

function next(n){

document.querySelectorAll(".section").forEach(s=>s.style.display="none");
document.getElementById("s"+n).style.display="block";

}

/* puzzle */

function check(){

let ans=document.getElementById("answer").value.toLowerCase();

if(ans==="sadaf"){
next(4);
typeWriter();
confetti();
}else{
alert("Try again 😊");
}

}

/* message */

const message=`Sadaf,

I didn't know what gift to give you,
so I made something different.

A little adventure on the internet,
just to celebrate you.

Your smile makes days brighter.
Your presence makes moments beautiful.

I hope this year brings you happiness,
peace, and dreams coming true.

Happy Birthday Noor ✨`;

let i=0;

function typeWriter(){
if(i<message.length){
document.getElementById("text").innerHTML+=message.charAt(i);
i++;
setTimeout(typeWriter,40);
}
}

/* confetti */

function confetti(){

for(let i=0;i<120;i++){

let conf=document.createElement("div");

conf.style.position="absolute";
conf.style.width="8px";
conf.style.height="8px";
conf.style.background="white";

conf.style.left=Math.random()*100+"vw";
conf.style.top="-10px";

conf.style.transition="3s";

document.body.appendChild(conf);

setTimeout(()=>{
conf.style.top="100vh";
conf.style.transform="rotate(720deg)";
},50);

setTimeout(()=>conf.remove(),3000);

}

}

</script>

</body>
</html>
